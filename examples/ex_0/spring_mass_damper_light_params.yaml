model:
  mass: 0.5
  damping: 0.1
  stiffness: 4.0
  initial_position: 0.5
  initial_velocity: 1.0
  report_rate_hz: 2.0

noise:
  force:                       # additive force disturbance into vel_dot
    distribution: uniform
    min: -0.02
    max:  0.02
  measurement:                 # additive noise on position output
    distribution: weibull
    shape: 2.0
    scale: 0.005

output:
  signals: [t, pos, vel]      # pos_noisy omitted — not logged for this instance
