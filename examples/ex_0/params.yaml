simulation:
  tmax: 10.0
  dt: 0.01
  integration_method: RK4   # EULER, RK2, or RK4

monte_carlo:
  runs: 3          # number of runs; seed = base_seed + run_number
  base_seed: 42    # deterministic: same base_seed always gives same results

output:
  dir: "output"
  format: csv      # csv or bin

models:
  - name: smd_heavy
    type: SpringMassDamper
    config: spring_mass_damper_heavy_params.yaml
    enabled: true

  - name: smd_light
    type: SpringMassDamper
    config: spring_mass_damper_light_params.yaml
    enabled: true
