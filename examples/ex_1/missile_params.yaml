model:
  initial_position: [0.0, 0.0, 200.0]   # m  (launch point, 200 m altitude)
  initial_velocity: [250.0, 0.0, -30.0]  # m/s (pitched slightly down toward target)
  nav_ratio: 4.0                          # proportional navigation gain N'
  max_accel: 200.0                        # m/s^2 acceleration saturation
  miss_distance: 20.0                     # m  intercept threshold
  report_rate_hz: 2.0

noise:
  ax:
    distribution: gaussian
    mean:   0.0
    stddev: 0.5     # m/s^2 IMU/actuator noise
  ay:
    distribution: gaussian
    mean:   0.0
    stddev: 0.5
  az:
    distribution: gaussian
    mean:   0.0
    stddev: 0.5

output:
  signals: [t, px, py, pz, vx, vy, vz, range]
