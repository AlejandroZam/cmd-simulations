model:
  initial_position: [3000.0, 200.0, 0.0]  # m  (ground vehicle ~3 km downrange)
  initial_velocity: [20.0, 5.0, 0.0]      # m/s (~21 m/s, crossing slightly)
  report_rate_hz: 2.0

noise:
  lateral_x:
    distribution: gaussian
    mean:   0.0
    stddev: 0.1    # m/s^2 terrain-induced lateral perturbations
  lateral_y:
    distribution: gaussian
    mean:   0.0
    stddev: 0.1

output:
  signals: [t, px, py, pz, vx, vy, vz]
