model:
  mass: 0.5
  damping: 0.1
  stiffness: 4.0
  initial_position: 0.5
  initial_velocity: 1.0
  report_rate_hz: 2.0

noise:
  force:
    distribution: uniform
    min: -0.02
    max:  0.02
  measurement:
    distribution: weibull
    shape: 2.0
    scale: 0.005

output:
  signals: [t, pos, vel]
