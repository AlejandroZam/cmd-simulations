model:
  mass: 2.0
  damping: 0.5
  stiffness: 4.0
  initial_position: 1.0
  initial_velocity: 0.0
  report_rate_hz: 2.0

noise:
  force:
    distribution: gaussian
    mean: 0.0
    stddev: 0.05
  measurement:
    distribution: laplace
    location: 0.0
    scale: 0.003

output:
  signals: [t, pos, vel, pos_noisy]
