simulation:
  tmax: 30.0
  dt: 0.01
  integration_method: RK4

monte_carlo:
  runs: 3
  base_seed: 7

output:
  format: csv

visualization:
  enabled: true
  host: "127.0.0.1"
  port: 9999

models:
  - name: target
    type: Target
    config: target_params.yaml
    enabled: true
    order: 0

  - name: missile
    type: Missile
    config: missile_params.yaml
    enabled: true
    order: 1
