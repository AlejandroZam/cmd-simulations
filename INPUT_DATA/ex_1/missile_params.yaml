model:
  initial_position: [0.0, 0.0, 200.0]
  initial_velocity: [250.0, 0.0, -30.0]
  nav_ratio: 4.0
  max_accel: 200.0
  miss_distance: 20.0
  report_rate_hz: 2.0
  target_topic: target

noise:
  ax:
    distribution: gaussian
    mean:   0.0
    stddev: 0.5
  ay:
    distribution: gaussian
    mean:   0.0
    stddev: 0.5
  az:
    distribution: gaussian
    mean:   0.0
    stddev: 0.5

output:
  signals: [t, px, py, pz, vx, vy, vz, range]
