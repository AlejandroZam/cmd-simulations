model:
  initial_position: [3000.0, 200.0, 0.0]
  initial_velocity: [20.0, 5.0, 0.0]
  report_rate_hz: 2.0

noise:
  lateral_x:
    distribution: gaussian
    mean:   0.0
    stddev: 0.1
  lateral_y:
    distribution: gaussian
    mean:   0.0
    stddev: 0.1

output:
  signals: [t, px, py, pz, vx, vy, vz]
